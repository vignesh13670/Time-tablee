<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interactive Timetable</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f4f7fb;
      color: #1f2937;
    }

    .container {
      max-width: 1100px;
      margin: 40px auto;
      padding: 24px;
    }

    .header {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
    }

    h1 {
      margin: 0;
      font-size: 2rem;
    }

    .subtext {
      margin-top: 8px;
      color: #4b5563;
      font-size: 0.95rem;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    button, select {
      border: none;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 0.95rem;
      cursor: pointer;
    }

    button {
      background: #2563eb;
      color: white;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    button:hover { opacity: 0.92; }
    button:active { transform: scale(0.98); }

    .secondary {
      background: #e5e7eb;
      color: #111827;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin: 18px 0 20px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      background: white;
      padding: 8px 12px;
      border-radius: 999px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
      font-size: 0.9rem;
    }

    .dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
    }

    .table-wrap {
      overflow-x: auto;
      background: white;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 850px;
    }

    thead th {
      background: #111827;
      color: white;
      padding: 14px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    tbody th {
      background: #f9fafb;
      min-width: 100px;
      padding: 14px;
      text-align: center;
      border-right: 1px solid #e5e7eb;
      font-weight: 700;
    }

    td {
      border: 1px solid #e5e7eb;
      height: 90px;
      padding: 8px;
      vertical-align: top;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    td:hover {
      background: #f8fbff;
    }

    .cell-content {
      display: flex;
      flex-direction: column;
      gap: 6px;
      height: 100%;
    }

    .subject {
      font-weight: 700;
      font-size: 0.95rem;
      line-height: 1.2;
    }

    .details {
      font-size: 0.82rem;
      color: #374151;
      line-height: 1.3;
      white-space: pre-wrap;
    }

    .empty {
      color: #9ca3af;
      font-style: italic;
      font-size: 0.88rem;
      margin-top: auto;
    }

    .study { background: #dbeafe; }
    .class { background: #dcfce7; }
    .meeting { background: #fef3c7; }
    .personal { background: #fce7f3; }
    .important { background: #fee2e2; }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(17, 24, 39, 0.55);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal.show { display: flex; }

    .modal-card {
      width: 100%;
      max-width: 480px;
      background: white;
      border-radius: 20px;
      padding: 22px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
    }

    .modal-card h2 {
      margin-top: 0;
      margin-bottom: 8px;
    }

    .modal-card p {
      color: #4b5563;
      margin-top: 0;
      margin-bottom: 16px;
      font-size: 0.92rem;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
      font-size: 0.92rem;
    }
