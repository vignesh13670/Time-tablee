<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interactive Timetable</title>  
  <style>
    * { box-sizing: border-box; }

    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #e5e7eb;
      --head: #111827;
      --shadow: 0 10px 28px rgba(0, 0, 0, 0.08);
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .container {
      max-width: 1180px;
      margin: 16px auto;
      padding: 12px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    h1 {
      margin: 0;
      font-size: 1.45rem;
    }

    .subtext {
      margin-top: 4px;
      color: var(--muted);
      font-size: 0.88rem;
      line-height: 1.35;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    button, select, input {
      border: 1px solid #d1d5db;
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 0.9rem;
    }

    button {
      background: #2563eb;
      color: white;
      border: none;
      cursor: pointer;
    }

    .secondary {
      background: #e5e7eb;
      color: #111827;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 8px 0 10px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      background: white;
      padding: 6px 10px;
      border-radius: 999px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);
      font-size: 0.82rem;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      display: inline-block;
    }

    .study { background: #dbeafe; }
    .class { background: #dcfce7; }
    .meeting { background: #fef3c7; }
    .personal { background: #fce7f3; }
    .important { background: #fee2e2; }

    .table-wrap {
      background: var(--card);
      border-radius: 16px;
      box-shadow: var(--shadow);
      overflow: auto;
      max-height: calc(100vh - 180px);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      min-width: 980px;
    }

    thead th {
      position: sticky;
      top: 0;
      z-index: 3;
      background: var(--head);
      color: white;
      padding: 8px 6px;
      font-size: 0.84rem;
      text-align: center;
    }

    tbody th {
      position: sticky;
      left: 0;
      z-index: 2;
      background: #f9fafb;
      width: 72px;
      min-width: 72px;
      padding: 2px 6px;
      text-align: center;
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      font-size: 0.72rem;
      font-weight: 700;
      color: #374151;
      height: 22px;
      line-height: 1.1;
    }

      border: 1px solid var(--line)
